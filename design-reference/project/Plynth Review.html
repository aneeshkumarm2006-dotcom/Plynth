mo\", lender: \"Family Office\", closed: \"Apr 30, 2026\" },\n    { no: \"0210\", city: \"Gatineau, QC\", amount: \"$398,000\", position: \"Second\", rate: \"10.5%\", fee: \"2.5%\", term: \"12 mo\", lender: \"Private Lender\", closed: \"Apr 22, 2026\" },\n  ],\n};\n\n<\/script>\n<script type=\"text/babel\">\n/* ============================================================\n   PLYNTH — Shared React atoms (used by both portals)\n   Exposes components on window for cross-file use.\n   ============================================================ */\nconst { useState, useEffect, useRef, useCallback } = React;\n\n/* ---- Monogram / Logo ---- */\nfunction Monogram({ size = 30, inverse = false }) {\n  const bg = inverse ? \"#FAF6EF\" : \"#1F2D44\";\n  const stroke = inverse ? \"#1F2D44\" : \"#FAF6EF\";\n  return (\n    <svg width={size} height={size} viewBox=\"0 0 32 32\" fill=\"none\" style={{ flexShrink: 0 }}>\n      <rect width=\"32\" height=\"32\" rx=\"7\" fill={bg} />\n      <path d=\"M11.6 24V8.4H16.8a4.8 4.8 0 0 1 0 9.6H11.6\" stroke={stroke} strokeWidth=\"2.5\" fill=\"none\" strokeLinecap=\"square\" />\n      <rect x=\"8.2\" y=\"24\" width=\"15.6\" height=\"2.3\" rx=\"0.5\" fill=\"#D4A574\" />\n    </svg>\n  );\n}\nfunction Logo({ size = 30, onClick, inverse = false }) {\n  return (\n    <a className=\"logo\" onClick={onClick} style={{ cursor: \"pointer\" }}>\n      <Monogram size={size} inverse={inverse} />\n      <span className=\"wordmark\" style={inverse ? { color: \"#FAF6EF\" } : null}>Plynth</span>\n    </a>\n  );\n}\n\n/* ---- Status pill ---- */\nconst PILL_LABELS = {\n  draft: \"Draft\", active: \"Active\", matched: \"Matched\", offer: \"Offer In\",\n  negotiating: \"Negotiating\", funded: \"Funded\", declined: \"Declined\", expired: \"Expired\",\n  interested: \"Interested\", reviewing: \"Reviewing\",\n};\nfunction Pill({ status, children }) {\n  const cls = { interested: \"pill-matched\", reviewing: \"pill-active\" }[status] || \"pill-\" + status;\n  return <span className={\"pill \" + cls}>{children || PILL_LABELS[status] || status}</span>;\n}\n\n/* ---- Editorial numbered section divider ---- */\nfunction SectionDivider({ n, label, meta, children }) {\n  return (\n    <div className=\"section-divider\">\n      <span className=\"sd-num\">{n}</span>\n      <span className=\"sd-slash\">/</span>\n      <span className=\"sd-label\">{label}</span>\n      {(meta || children) && <span className=\"sd-meta\">{meta}{children}</span>}\n    </div>\n  );\n}\n\n/* ---- Stat block ---- */\nfunction StatBlock({ value, unit, label, delta, deltaDir }) {\n  return (\n    <div className=\"stat\">\n      <div className=\"stat-value\">{value}{unit && <span className=\"unit\">{unit}</span>}</div>\n      <div className=\"stat-label\">{label}</div>\n      {delta && <div className={\"stat-delta \" + (deltaDir || \"up\")}>{delta}</div>}\n    </div>\n  );\n}\nfunction StatStrip({ stats }) {\n  return (\n    <div className=\"stat-strip\">\n      {stats.map((s, i) => <StatBlock key={i} {...s} />)}\n    </div>\n  );\n}\n\n/* ---- Deal number ---- */\nfunction DealNo({ n, size = 13 }) {\n  return <span className=\"deal-no\" style={{ fontSize: size }}>Deal № {n}</span>;\n}\n\n/* ---- Match score bar ---- */\nfunction MatchBar({ score, width = 120 }) {\n  return (\n    <div className=\"matchbar\">\n      <div className=\"track\" style={{ width }}><div className=\"fill\" style={{ width: score + \"%\" }} /></div>\n      <span className=\"val\">{score}</span>\n    </div>\n  );\n}\n\n/* ---- Definition list ---- */\nfunction DefList({ items, style }) {\n  return (\n    <dl className=\"deflist\" style={style}>\n      {items.map(([dt, dd], i) => (\n        <div className=\"row\" key={i}><dt>{dt}</dt><dd>{dd}</dd></div>\n      ))}\n    </dl>\n  );\n}\n\n/* ---- Field ---- */\nfunction Field({ label, hint, children, style }) {\n  return (\n    <div className=\"field\" style={style}>\n      {label && <label>{label}</label>}\n      {children}\n      {hint && <div className=\"hint\">{hint}</div>}\n    </div>\n  );\n}\n\n/* ---- Chip (multi-select) ---- */\nfunction Chip({ on, onClick, children, removable }) {\n  return (\n    <span className={\"chip\" + (on ? \" is-on\" : \"\")} onClick={onClick} role=\"button\" aria-pressed={!!on}>\n      {children}{removable && <span className=\"x\">×</span>}\n    </span>\n  );\n}\n\n/* ---- Toast ---- */\nfunction Toast({ show, title, sub, action, onAction }) {\n  return (\n    <div className={\"toast\" + (show ? \" show\" : \"\")}>\n      <div>\n        <div style={{ fontWeight: 600 }}>{title}</div>\n        {sub && <div className=\"small muted-text\">{sub}</div>}\n      </div>\n      {action && <button className=\"btn btn-tertiary btn-sm\" style={{ marginLeft: 8 }} onClick={onAction}>{action}</button>}\n    </div>\n  );\n}\n// Toast hook\nfunction useToast() {\n  const [toast, setToast] = useState(null);\n  const fire = useCallback((t) => {\n    setToast({ ...t, show: true });\n    setTimeout(() => setToast((p) => p ? { ...p, show: false } : null), 3400);\n  }, []);\n  return [toast, fire];\n}\n\n/* ---- Avatar ---- */\nfunction Avatar({ initials, size = 36, src }) {\n  return (\n    <div style={{\n      width: size, height: size, borderRadius: \"50%\", flexShrink: 0,\n      background: \"var(--slate-bg)\", border: \"1px solid var(--border)\",\n      display: \"flex\", alignItems: \"center\", justifyContent: \"center\",\n      fontSize: size * 0.36, fontWeight: 600, color: \"var(--slate)\", fontFamily: \"var(--serif)\",\n      overflow: \"hidden\",\n    }}>\n      {src ? <img src={src} style={{ width: \"100%\", height: \"100%\", objectFit: \"cover\" }} /> : initials}\n    </div>\n  );\n}\n\n/* ---- Empty state ---- */\nfunction EmptyState({ title, sub, action }) {\n  return (\n    <div className=\"empty\">\n      <div className=\"em-title\">{title}</div>\n      <div className=\"em-sub\">{sub}</div>\n      {action && <div style={{ marginTop: 24 }}>{action}</div>}\n    </div>\n  );\n}\n\n/* ---- Profile dropdown ---- */\nfunction ProfileMenu({ name, sub, initials, items }) {\n  const [open, setOpen] = useState(false);\n  const ref = useRef();\n  useEffect(() => {\n    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };\n    document.addEventListener(\"mousedown\", h);\n    return () => document.removeEventListener(\"mousedown\", h);\n  }, []);\n  return (\n    <div ref={ref} style={{ position: \"relative\" }}>\n      <button onClick={() => setOpen(o => !o)} style={{\n        display: \"flex\", alignItems: \"center\", gap: 10, background: \"transparent\",\n        border: \"none\", cursor: \"pointer\", padding: \"4px 6px\", borderRadius: 6,\n      }}>\n        <Avatar initials={initials} size={32} />\n        <span className=\"small\" style={{ fontWeight: 600, color: \"var(--slate-deep)\" }}>{name}</span>\n        <svg width=\"12\" height=\"8\" viewBox=\"0 0 12 8\" style={{ marginTop: 2 }}><path d=\"M1 1l5 5 5-5\" stroke=\"#6B7280\" strokeWidth=\"1.5\" fill=\"none\" strokeLinecap=\"round\" /></svg>\n      </button>\n      {open && (\n        <div className=\"card fade-in\" style={{\n          position: \"absolute\", right: 0, top: \"calc(100% + 8px)\", width: 220,\n          boxShadow: \"var(--shadow-lg)\", padding: 8, zIndex: 60,\n        }}>\n          <div style={{ padding: \"10px 12px\", borderBottom: \"1px solid var(--border)\", marginBottom: 4 }}>\n            <div className=\"small\" style={{ fontWeight: 600, color: \"var(--slate-deep)\" }}>{name}</div>\n            <div className=\"micro muted-text\">{sub}</div>\n          </div>\n          {items.map((it, i) => (\n            <div key={i} onClick={() => { setOpen(false); it.onClick && it.onClick(); }}\n              style={{ padding: \"9px 12px\", borderRadius: 6, cursor: \"pointer\", fontSize: 14, color: it.danger ? \"var(--dust)\" : \"var(--text)\" }}\n              onMouseEnter={e => e.currentTarget.style.background = \"rgba(59,84,122,0.05)\"}\n              onMouseLeave={e => e.currentTarget.style.background = \"transparent\"}>\n              {it.label}\n            </div>\n          ))}\n        </div>\n      )}\n    </div>\n  );\n}\n\n/* ---- Sidebar nav ---- */\nfunction Sidebar({ items, active, onNavigate, footer }) {\n  return (\n    <aside className=\"sidebar\">\n      {items.map((it, i) => (\n        it.group\n          ? <div key={i} className=\"nav-group-label\">{it.group}</div>\n          : <a key={i} className={\"nav-item\" + (active === it.id ? \" active\" : \"\")} onClick={() => onNavigate(it.id)}>{it.label}</a>\n      ))}\n      <div style={{ flex: 1 }} />\n      {footer}\n    </aside>\n  );\n}\n\n/* ---- Striped figure placeholder ---- */\nfunction FigurePlaceholder({ label, style }) {\n  return (\n    <div style={{\n      background: \"repeating-linear-gradient(135deg,#F1ECE2,#F1ECE2 9px,#EDE7DB 9px,#EDE7DB 18px)\",\n      border: \"1px solid var(--border)\", borderRadius: \"var(--r-card)\",\n      display: \"flex\", alignItems: \"center\", justifyContent: \"center\", ...style,\n    }}>\n      <span style={{ fontFamily: \"ui-monospace,Menlo,monospace\", fontSize: 11, color: \"var(--muted)\", letterSpacing: \"0.04em\" }}>{label}</span>\n    </div>\n  );\n}\n\nObject.assign(window, {\n  Monogram, Logo, Pill, SectionDivider, StatBlock, StatStrip, DealNo, MatchBar,\n  DefList, Field, Chip, Toast, useToast, Avatar, EmptyState, ProfileMenu, Sidebar, FigurePlaceholder,\n});\n\n<\/script>\n<script type=\"text/babel\">\n/* ============================================================\n   PLYNTH — Broker in-app screens\n   Dashboard · Pipeline · Deal detail · Lenders · Funded\n   ============================================================ */\nconst B = window.BROKER;\n\n/* ---------- DEAL IN FOCUS — editorial hero ---------- */\nfunction DealInFocus({ nav }) {\n  const f = B.focus;\n  return (\n    <div className=\"card fade-in\" style={{ overflow: \"hidden\", position: \"relative\" }}>\n      <div style={{ display: \"grid\", gridTemplateColumns: \"1.55fr 1fr\", minHeight: 300 }} className=\"focus-grid\">\n        {/* Left — the editorial pull-quote */}\n        <div style={{ padding: \"40px 44px 40px\", display: \"flex\", flexDirection: \"column\" }}>\n          <div style={{ display: \"flex\", alignItems: \"center\", gap: 14, marginBottom: 28 }}>\n            <span className=\"eyebrow\" style={{ color: \"var(--amber-deep)\" }}>Deal in focus</span>\n            <span style={{ width: 1, height: 12, background: \"var(--border)\" }} />\n            <DealNo n={f.no} />\n            <Pill status=\"negotiating\" />\n          </div>\n          <blockquote style={{\n            fontFamily: \"var(--serif)\", fontSize: 25, lineHeight: 1.42, letterSpacing: \"-0.01em\",\n            color: \"var(--slate-deep)\", margin: 0, maxWidth: \"34ch\", flex: 1,\n          }}>\n            “{f.quote}”\n          </blockquote>\n          <div style={{ display: \"flex\", alignItems: \"center\", gap: 18, marginTop: 32 }}>\n            <button className=\"btn btn-primary\" onClick={() => nav(\"deal\", f.no)}>Review offers</button>\n            <span className=\"small muted-text\">{f.offers} offers · {f.views} lender views</span>\n          </div>\n        </div>\n        {/* Right — the numbers, deliberately set */}\n        <div style={{ padding: \"40px 44px\", borderLeft: \"1px solid var(--border)\", background: \"#FCFAF5\", display: \"flex\", flexDirection: \"column\", justifyContent: \"center\" }}>\n          <div className=\"micro\" style={{ letterSpacing: \"0.12em\", textTransform: \"uppercase\", color: \"var(--muted)\", marginBottom: 6 }}>{f.neighbourhood} · {f.city}</div>\n          <div className=\"tnum\" style={{ fontFamily: \"var(--serif)\", fontSize: 44, fontWeight: 600, letterSpacing: \"-0.02em\", color: \"var(--slate-deep)\", lineHeight: 1 }}>\n            {f.amount} <span style={{ fontSize: 15, color: \"var(--text-2)\" }}>CAD</span>\n          </div>\n          <DefList style={{ marginTop: 22 }} items={[\n            [\"Position\", f.position],\n            [\"LTV\", f.ltv],\n            [\"Term\", f.term],\n            [\"Rate expectation\", f.rate],\n          ]} />\n        </div>\n      </div>\n    </div>\n  );\n}\n\n/* ---------- Small offer card (dashboard column) ---------- */\nfunction MiniOffer({ o, nav }) {\n  return (\n    <div className=\"card card-pad card-hover\" style={{ padding: 20, cursor: \"pointer\" }} onClick={() => nav(\"deal\", o.no)}>\n      <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\", marginBottom: 12 }}>\n        <DealNo n={o.no} />\n        <span className=\"micro muted-text\">{o.city}</span>\n      </div>\n      <div style={{ display: \"flex\", alignItems: \"baseline\", gap: 8, marginBottom: 14 }}>\n        <span className=\"tnum\" style={{ fontFamily: \"var(--serif)\", fontSize: 26, color: \"var(--slate-deep)\", fontWeight: 600 }}>{o.rate}</span>\n        <span className=\"small muted-text\">· {o.fee} fee · {o.term}</span>\n      </div>\n      <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\" }}>\n        <span className=\"micro muted-text\">{o.lender}</span>\n        <span className=\"micro\" style={{ color: \"var(--amber-deep)\", fontWeight: 600 }}>Expires in {o.expires}</span>\n      </div>\n    </div>\n  );\n}\n\nfunction MiniAwaiting({ d, nav }) {\n  return (\n    <div className=\"card card-pad card-hover\" style={{ padding: 20, cursor: \"pointer\" }} onClick={() => nav(\"deal\", d.no)}>\n      <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\", marginBottom: 10 }}>\n        <DealNo n={d.no} />\n        <span className=\"micro muted-text\">{d.city}</span>\n      </div>\n      <div className=\"tnum\" style={{ fontFamily: \"var(--serif)\", fontSize: 22, color: \"var(--slate-deep)\", fontWeight: 600, marginBottom: 8 }}>{d.amount}</div>\n      <div className=\"micro muted-text\">{d.ltv} LTV · {d.term} · {d.views} views</div>\n      <div className=\"micro muted-text\" style={{ marginTop: 6 }}>Submitted {d.submitted}</div>\n    </div>\n  );\n}\n\nfunction MiniFunded({ d, nav }) {\n  return (\n    <div className=\"card card-pad card-hover\" style={{ padding: 20, cursor: \"pointer\" }} onClick={() => nav(\"deal\", d.no)}>\n      <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\", marginBottom: 10 }}>\n        <DealNo n={d.no} /><Pill status=\"funded\" />\n      </div>\n      <div className=\"tnum\" style={{ fontFamily: \"var(--serif)\", fontSize: 22, color: \"var(--slate-deep)\", fontWeight: 600 }}>{d.amount}</div>\n      <div className=\"micro muted-text\" style={{ marginTop: 6 }}>{d.city} · {d.rate} · Closed {d.closed}</div>\n    </div>\n  );\n}\n\n/* ---------- DASHBOARD ---------- */\nfunction BrokerDashboard({ nav }) {\n  const hour = new Date().getHours();\n  const greet = hour < 12 ? \"Good morning\" : hour < 18 ? \"Good afternoon\" : \"Good evening\";\n  return (\n    <div className=\"page page-wide\">\n      <div style={{ marginBottom: 36 }}>\n        <h1 className=\"h1\">{greet}, {B.user.first}</h1>\n        <p className=\"lead\" style={{ marginTop: 8, fontSize: 17 }}>Three new offers arrived overnight. One deal is in active negotiation.</p>\n      </div>\n\n      <div style={{ marginBottom: 32 }}><StatStrip stats={B.stats} /></div>\n\n      <div style={{ marginBottom: 44 }}>\n        <DealInFocus nav={nav} />\n      </div>\n\n      <div style={{ display: \"grid\", gridTemplateColumns: \"repeat(3,1fr)\", gap: 32 }} className=\"dash-cols\">\n        <div>\n          <SectionDivider n=\"01\" label=\"New Offers\" meta={B.newOffers.length + \" in\"} />\n          <div style={{ display: \"flex\", flexDirection: \"column\", gap: 14 }}>\n            {B.newOffers.map((o, i) => <MiniOffer key={i} o={o} nav={nav} />)}\n          </div>\n        </div>\n        <div>\n          <SectionDivider n=\"02\" label=\"Awaiting Response\" meta={B.awaiting.length + \" deals\"} />\n          <div style={{ display: \"flex\", flexDirection: \"column\", gap: 14 }}>\n            {B.awaiting.map((d, i) => <MiniAwaiting key={i} d={d} nav={nav} />)}\n          </div>\n        </div>\n        <div>\n          <SectionDivider n=\"03\" label=\"Recently Funded\" meta=\"This month\" />\n          <div style={{ display: \"flex\", flexDirection: \"column\", gap: 14 }}>\n            {B.recentFunded.map((d, i) => <MiniFunded key={i} d={d} nav={nav} />)}\n          </div>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n/* ---------- PIPELINE ---------- */\nfunction BrokerPipeline({ nav }) {\n  const [filter, setFilter] = useState(\"all\");\n  const filters = [[\"all\", \"All\"], [\"active\", \"Active\"], [\"offer\", \"Offer In\"], [\"negotiating\", \"Negotiating\"], [\"draft\", \"Draft\"]];\n  const rows = B.pipeline.filter(d => filter === \"all\" || d.status === filter);\n  return (\n    <div className=\"page page-wide\">\n      <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"flex-end\", marginBottom: 28 }}>\n        <div>\n          <h1 className=\"h1\">Pipeline</h1>\n          <p className=\"lead\" style={{ fontSize: 16, marginTop: 6 }}>{B.pipeline.length} deals in the marketplace.</p>\n        </div>\n        <button className=\"btn btn-primary\" onClick={() => nav(\"submit\")}>Submit a deal</button>\n      </div>\n      <div style={{ display: \"flex\", gap: 10, marginBottom: 24 }}>\n        {filters.map(([id, lbl]) => <Chip key={id} on={filter === id} onClick={() => setFilter(id)}>{lbl}</Chip>)}\n      </div>\n      <div className=\"card\" style={{ overflow: \"hidden\" }}>\n        <table style={{ width: \"100%\", borderCollapse: \"collapse\" }}>\n          <thead>\n            <tr style={{ borderBottom: \"1px solid var(--border)\" }}>\n              {[\"Deal\", \"Location\", \"Amount\", \"Position\", \"LTV\", \"Term\", \"Offers\", \"Status\", \"\"].map((h, i) => (\n                <th key={i} style={{ textAlign: i >= 2 && i <= 6 ? \"right\" : \"left\", padding: \"14px 18px\", fontSize: 11, fontWeight: 600, letterSpacing: \"0.08em\", textTransform: \"uppercase\", color: \"var(--text-2)\" }}>{h}</th>\n              ))}\n            </tr>\n          </thead>\n          <tbody>\n            {rows.map((d, i) => (\n              <tr key={i} className=\"prow\" style={{ borderBottom: i < rows.length - 1 ? \"1px solid var(--border)\" : \"none\", cursor: \"pointer\" }}\n                onClick={() => nav(\"deal\", d.no)}\n                onMouseEnter={e => e.currentTarget.style.background = \"#FCFAF5\"}\n                onMouseLeave={e => e.currentTarget.style.background = \"transparent\"}>\n                <td style={{ padding: \"16px 18px\" }}><span className=\"deal-no\" style={{ fontSize: 14 }}>№ {d.no}</span></td>\n                <td style={{ padding: \"16px 18px\", fontSize: 14 }}>{d.city}</td>\n                <td className=\"num\" style={{ padding: \"16px 18px\", textAlign: \"right\", fontWeight: 600, color: \"var(--slate-deep)\" }}>{d.amount}</td>\n                <td style={{ padding: \"16px 18px\", textAlign: \"right\", fontSize: 14, color: \"var(--text-2)\" }}>{d.position}</td>\n                <td className=\"num\" style={{ padding: \"16px 18px\", textAlign: \"right\" }}>{d.ltv}</td>\n                <td className=\"num\" style={{ padding: \"16px 18px\", textAlign: \"right\", color: \"var(--text-2)\" }}>{d.term}</td>\n                <td className=\"num\" style={{ padding: \"16px 18px\", textAlign: \"right\" }}>{d.offers || \"—\"}</td>\n                <td style={{ padding: \"16px 18px\" }}><Pill status={d.status} /></td>\n                <td style={{ padding: \"16px 18px\", textAlign: \"right\", color: \"var(--muted)\", fontSize: 18 }}>›</td>\n              </tr>\n            ))}\n          </tbody>\n        </table>\n      </div>\n    </div>\n  );\n}\n\n/* ---------- DEAL DETAIL ---------- */\nfunction OfferCard({ o, nav, toast }) {\n  return (\n    <div className=\"card card-pad\" style={{ borderColor: o.best ? \"var(--amber)\" : \"var(--border)\", position: \"relative\" }}>\n      {o.best && <div style={{ position: \"absolute\", top: -1, right: 20, background: \"var(--amber)\", color: \"var(--slate-deep)\", fontSize: 10, fontWeight: 700, letterSpacing: \"0.08em\", textTransform: \"uppercase\", padding: \"3px 10px\", borderRadius: \"0 0 5px 5px\" }}>Leading offer</div>}\n      <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"flex-start\", marginBottom: 16 }}>\n        <div>\n          <div className=\"small\" style={{ fontWeight: 600, color: \"var(--slate-deep)\" }}>Lender {o.id} — Anonymized</div>\n          <div className=\"micro muted-text\">{o.type}</div>\n        </div>\n        <span className=\"micro\" style={{ color: \"var(--amber-deep)\", fontWeight: 600 }}>Expires in {o.expires}</span>\n      </div>\n      <div style={{ display: \"grid\", gridTemplateColumns: \"repeat(4,1fr)\", gap: 0, marginBottom: 16, border: \"1px solid var(--border)\", borderRadius: 6, overflow: \"hidden\" }}>\n        {[[\"Rate\", o.rate], [\"Lender fee\", o.lenderFee], [\"Broker fee\", o.brokerFee], [\"Term\", o.term]].map(([l, v], i) => (\n          <div key={i} style={{ padding: \"12px 14px\", borderRight: i < 3 ? \"1px solid var(--border)\" : \"none\" }}>\n            <div className=\"micro muted-text\" style={{ marginBottom: 4 }}>{l}</div>\n            <div className=\"num\" style={{ fontSize: 17, fontWeight: 600, color: \"var(--slate-deep)\", fontFamily: \"var(--serif)\" }}>{v}</div>\n          </div>\n        ))}\n      </div>\n      <div style={{ marginBottom: 14 }}>\n        <span className=\"micro muted-text\">Conditions · </span>\n        <span className=\"small\">{o.conditions}</span>\n      </div>\n      {o.note && <p className=\"small\" style={{ color: \"var(--text-2)\", fontStyle: \"italic\", marginBottom: 16, paddingLeft: 12, borderLeft: \"2px solid var(--border)\" }}>“{o.note}”</p>}\n      <div style={{ display: \"flex\", gap: 10 }}>\n        <button className=\"btn btn-primary btn-sm\" style={{ flex: 1 }} onClick={() => toast({ title: \"Offer from Lender \" + o.id + \" accepted\", sub: \"The lender has been notified. Funding instructions will follow.\" })}>Accept</button>\n        <button className=\"btn btn-secondary btn-sm\" onClick={() => toast({ title: \"Counter sent to Lender \" + o.id, sub: \"You'll be notified when they respond.\" })}>Counter</button>\n        <button className=\"btn btn-danger btn-sm\" onClick={() => toast({ title: \"Offer declined\", sub: \"Lender \" + o.id + \" has been removed from this deal.\" })}>Decline</button>\n      </div>\n    </div>\n  );\n}\n\nfunction BrokerDealDetail({ nav, toast, dealNo }) {\n  const f = B.focus;\n  return (\n    <div className=\"page page-wide\">\n      <button className=\"btn btn-tertiary btn-sm\" style={{ marginBottom: 16, paddingLeft: 0 }} onClick={() => nav(\"pipeline\")}>‹ Back to pipeline</button>\n      <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"flex-start\", marginBottom: 8 }}>\n        <div>\n          <div style={{ display: \"flex\", alignItems: \"center\", gap: 14, marginBottom: 10 }}>\n            <DealNo n={dealNo || f.no} size={15} /><Pill status=\"negotiating\" />\n          </div>\n          <h1 className=\"h1\">{f.amount} <span style={{ fontSize: 18, color: \"var(--text-2)\", fontFamily: \"var(--sans)\", fontWeight: 500 }}>CAD</span></h1>\n          <p className=\"lead\" style={{ fontSize: 16, marginTop: 6 }}>{f.position} · {f.neighbourhood}, {f.city}</p>\n        </div>\n        <div style={{ display: \"flex\", gap: 10 }}>\n          <button className=\"btn btn-ghost btn-sm\" onClick={() => toast({ title: \"Borrower details revealed\", sub: \"Visible to lenders with active offers.\" })}>Reveal borrower</button>\n          <button className=\"btn btn-secondary btn-sm\">Edit deal</button>\n        </div>\n      </div>\n\n      <div style={{ display: \"grid\", gridTemplateColumns: \"1fr 360px\", gap: 40, marginTop: 36 }} className=\"detail-grid\">\n        <div>\n          {/* Facts + AI summary */}\n          <div style={{ display: \"grid\", gridTemplateColumns: \"1fr 1fr\", gap: 32, marginBottom: 44 }}>\n            <div>\n              <SectionDivider n=\"01\" label=\"Deal facts\" />\n              <DefList items={[\n                [\"Property type\", \"Detached, residential\"],\n                [\"Loan amount\", f.amount + \" CAD\"],\n                [\"Position\", f.position],\n                [\"LTV\", f.ltv],\n                [\"Appraised value\", \"$590,000 CAD\"],\n                [\"Term\", f.term],\n                [\"Rate expectation\", f.rate],\n                [\"Purpose\", \"Refinance — debt consolidation\"],\n              ]} />\n            </div>\n            <div>\n              <SectionDivider n=\"02\" label=\"Summary\" meta=\"AI-generated\" />\n              <p className=\"body\" style={{ color: \"var(--text)\", lineHeight: 1.65 }}>\n                A first mortgage refinance on an owner-occupied detached home in East York, Toronto.\n                The borrower is self-employed with two years of established business income and seeks to\n                consolidate higher-interest obligations.\n              </p>\n              <p className=\"body\" style={{ color: \"var(--text)\", lineHeight: 1.65, marginTop: 14 }}>\n                At 72% loan-to-value against a recent appraisal of $590,000, the position is conservative\n                for the segment. Exit is via refinance to an institutional lender at term, supported by an\n                improving credit profile. Comparable East York refinances on Plynth have funded between\n                8.75% and 9.5%.\n              </p>\n            </div>\n          </div>\n\n          {/* Offers */}\n          <SectionDivider n=\"03\" label=\"Offers\" meta={B.dealOffers.length + \" received\"} />\n          <div style={{ display: \"flex\", flexDirection: \"column\", gap: 16 }}>\n            {B.dealOffers.map((o, i) => <OfferCard key={i} o={o} nav={nav} toast={toast} />)}\n          </div>\n        </div>\n\n        {/* Activity log */}\n        <div>\n          <SectionDivider n=\"04\" label=\"Activity\" />\n          <div style={{ position: \"relative\", paddingLeft: 20 }}>\n            <div style={{ position: \"absolute\", left: 3, top: 6, bottom: 6, width: 1, background: \"var(--border)\" }} />\n            {B.activity.map((a, i) => (\n              <div key={i} style={{ position: \"relative\", paddingBottom: 22 }}>\n                <div style={{ position: \"absolute\", left: -20, top: 5, width: 7, height: 7, borderRadius: \"50%\", background: i === 0 ? \"var(--amber)\" : \"var(--border)\", border: \"2px solid var(--offwhite)\" }} />\n                <div className=\"micro muted-text\" style={{ marginBottom: 2 }}>{a.t}</div>\n                <div className=\"small\" style={{ color: \"var(--slate-deep)\" }}>{a.e}</div>\n              </div>\n            ))}\n          </div>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n/* ---------- LENDERS DIRECTORY ---------- */\nfunction BrokerLenders({ nav }) {\n  return (\n    <div className=\"page page-wide\">\n      <div style={{ marginBottom: 28 }}>\n        <h1 className=\"h1\">Lenders</h1>\n        <p className=\"lead\" style={{ fontSize: 16, marginTop: 6 }}>{B.lenders.length} subscribed lenders match your typical deals. Criteria shown; contact is brokered through Plynth.</p>\n      </div>\n      <div style={{ display: \"grid\", gridTemplateColumns: \"1fr 1fr\", gap: 16 }} className=\"lender-grid\">\n        {B.lenders.map((l, i) => (\n          <div key={i} className=\"card card-pad card-hover\">\n            <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"flex-start\", marginBottom: 16 }}>\n              <div>\n                <h3 className=\"h4\" style={{ marginBottom: 2 }}>{l.name}</h3>\n                <div className=\"micro muted-text\">{l.type} · {l.region}</div>\n              </div>\n              <span className=\"pill pill-active\" style={{ background: \"var(--slate-bg)\" }}>Subscribed</span>\n            </div>\n            <DefList items={[\n              [\"Asset classes\", l.assets],\n              [\"Max LTV\", l.ltv],\n              [\"Deal size\", l.size],\n              [\"Typical close\", l.speed],\n            ]} />\n          </div>\n        ))}\n      </div>\n    </div>\n  );\n}\n\n/* ---------- FUNDED ---------- */\nfunction BrokerFunded({ nav }) {\n  const [sort, setSort] = useState(\"date\");\n  const total = \"$5.92M\";\n  return (\n    <div className=\"page page-wide\">\n      <div style={{ marginBottom: 28 }}>\n        <h1 className=\"h1\">Funded</h1>\n        <p className=\"lead\" style={{ fontSize: 16, marginTop: 6 }}>Your verifiable track record on Plynth.</p>\n      </div>\n      <div className=\"stat-strip\" style={{ marginBottom: 28, gridTemplateColumns: \"repeat(3,1fr)\" }}>\n        <StatBlock value=\"$5.92\" unit=\"M\" label=\"Funded — Trailing 90 Days\" />\n        <StatBlock value=\"$38.6\" unit=\"M\" label=\"Volume YTD\" />\n        <StatBlock value=\"9.1\" unit=\"%\" label=\"Avg Funded Rate\" />\n      </div>\n      <div className=\"card\" style={{ overflow: \"hidden\" }}>\n        <table style={{ width: \"100%\", borderCollapse: \"collapse\" }}>\n          <thead>\n            <tr style={{ borderBottom: \"1px solid var(--border)\" }}>\n              {[\"Deal\", \"Location\", \"Amount\", \"Position\", \"Rate\", \"Fee\", \"Term\", \"Lender\", \"Closed\"].map((h, i) => (\n                <th key={i} style={{ textAlign: i >= 2 && i <= 6 ? \"right\" : \"left\", padding: \"14px 18px\", fontSize: 11, fontWeight: 600, letterSpacing: \"0.08em\", textTransform: \"uppercase\", color: \"var(--text-2)\" }}>{h}</th>\n              ))}\n            </tr>\n          </thead>\n          <tbody>\n            {B.funded.map((d, i) => (\n              <tr key={i} style={{ borderBottom: i < B.funded.length - 1 ? \"1px solid var(--border)\" : \"none\" }}>\n                <td style={{ padding: \"16px 18px\" }}><span className=\"deal-no\" style={{ fontSize: 14 }}>№ {d.no}</span></td>\n                <td style={{ padding: \"16px 18px\", fontSize: 14 }}>{d.city}</td>\n                <td className=\"num\" style={{ padding: \"16px 18px\", textAlign: \"right\", fontWeight: 600, color: \"var(--slate-deep)\" }}>{d.amount}</td>\n                <td style={{ padding: \"16px 18px\", textAlign: \"right\", fontSize: 14, color: \"var(--text-2)\" }}>{d.position}</td>\n                <td className=\"num\" style={{ padding: \"16px 18px\", textAlign: \"right\" }}>{d.rate}</td>\n                <td className=\"num\" style={{ padding: \"16px 18px\", textAlign: \"right\", color: \"var(--text-2)\" }}>{d.fee}</td>\n                <td className=\"num\" style={{ padding: \"16px 18px\", textAlign: \"right\", color: \"var(--text-2)\" }}>{d.term}</td>\n                <td style={{ padding: \"16px 18px\", fontSize: 13, color: \"var(--text-2)\" }}>{d.lender}</td>\n                <td className=\"num\" style={{ padding: \"16px 18px\", fontSize: 13, color: \"var(--text-2)\" }}>{d.closed}</td>\n              </tr>\n            ))}\n          </tbody>\n        </table>\n      </div>\n    </div>\n  );\n}\n\nObject.assign(window, { BrokerDashboard, BrokerPipeline, BrokerDealDetail, BrokerLenders, BrokerFunded });\n\n<\/script>\n<script type=\"text/babel\">\n/* ============================================================\n   PLYNTH — Broker auth & forms\n   Login · Signup (3 steps) · Submit Deal · Settings\n   ============================================================ */\n\n/* ---------- AUTH SHELL (centered, off-white) ---------- */\nfunction AuthShell({ children, wide }) {\n  return (\n    <div style={{ minHeight: \"100vh\", display: \"flex\", flexDirection: \"column\", alignItems: \"center\", padding: \"64px 24px\" }}>\n      <div style={{ marginBottom: 40 }}><Logo size={32} /></div>\n      <div className=\"card fade-in\" style={{ width: \"100%\", maxWidth: wide || 440, padding: \"40px 40px 36px\", boxShadow: \"var(--shadow-md)\" }}>\n        {children}\n      </div>\n      <p className=\"micro muted-text\" style={{ marginTop: 28, maxWidth: 380, textAlign: \"center\", lineHeight: 1.6 }}>\n        Plynth operates a marketplace for licensed Canadian mortgage professionals. Access is reviewed.\n      </p>\n    </div>\n  );\n}\n\n/* ---------- LOGIN ---------- */\nfunction BrokerLogin({ nav, onAuth }) {\n  return (\n    <AuthShell>\n      <h2 className=\"h2\" style={{ marginBottom: 6 }}>Sign in</h2>\n      <p className=\"small muted-text\" style={{ marginBottom: 28 }}>Welcome back to the marketplace.</p>\n      <Field label=\"Email\"><input className=\"input\" type=\"email\" defaultValue=\"marcus@northbridge.ca\" /></Field>\n      <Field label=\"Password\"><input className=\"input\" type=\"password\" defaultValue=\"••••••••••\" /></Field>\n      <div style={{ display: \"flex\", justifyContent: \"flex-end\", marginBottom: 22 }}>\n        <a className=\"small\" style={{ color: \"var(--slate)\" }}>Forgot password</a>\n      </div>\n      <button className=\"btn btn-primary btn-block\" onClick={onAuth}>Sign in</button>\n      <p className=\"small muted-text\" style={{ textAlign: \"center\", marginTop: 22 }}>\n        New to Plynth? <a style={{ color: \"var(--slate)\", fontWeight: 600 }} onClick={() => nav(\"signup\")}>Request access</a>\n      </p>\n    </AuthShell>\n  );\n}\n\n/* ---------- SIGNUP (3 steps) ---------- */\nfunction StepDots({ step, total }) {\n  return (\n    <div style={{ display: \"flex\", gap: 6, marginBottom: 28 }}>\n      {Array.from({ length: total }).map((_, i) => (\n        <div key={i} style={{ height: 3, flex: 1, borderRadius: 2, background: i <= step ? \"var(--slate)\" : \"var(--border)\", transition: \"background 200ms\" }} />\n      ))}\n    </div>\n  );\n}\n\nfunction BrokerSignup({ nav, onAuth }) {\n  const [step, setStep] = useState(0);\n  const labels = [\"Account\", \"License\", \"Profile\"];\n  return (\n    <AuthShell wide={480}>\n      <StepDots step={step} total={3} />\n      <div style={{ display: \"flex\", alignItems: \"center\", gap: 10, marginBottom: 24 }}>\n        <span className=\"sd-num\" style={{ fontFamily: \"var(--serif)\", color: \"var(--amber-deep)\", fontSize: 13 }}>{\"0\" + (step + 1)}</span>\n        <span className=\"sd-slash\" style={{ color: \"var(--border)\" }}>/</span>\n        <span className=\"sd-label\" style={{ fontSize: 12, fontWeight: 600, letterSpacing: \"0.12em\", textTransform: \"uppercase\", color: \"var(--slate-deep)\" }}>{labels[step]}</span>\n      </div>\n\n      {step === 0 && (\n        <div className=\"fade-in\">\n          <h2 className=\"h3\" style={{ marginBottom: 22 }}>Create your account</h2>\n          <Field label=\"Work email\"><input className=\"input\" type=\"email\" placeholder=\"you@brokerage.ca\" /></Field>\n          <Field label=\"Password\" hint=\"At least 12 characters.\"><input className=\"input\" type=\"password\" placeholder=\"••••••••••••\" /></Field>\n          <Field label=\"Brokerage name\"><input className=\"input\" placeholder=\"e.g. Northbridge Mortgage Partners\" /></Field>\n        </div>\n      )}\n      {step === 1 && (\n        <div className=\"fade-in\">\n          <h2 className=\"h3\" style={{ marginBottom: 6 }}>License verification</h2>\n          <p className=\"small muted-text\" style={{ marginBottom: 22 }}>We confirm your standing with the provincial regulator before access is granted.</p>\n          <Field label=\"Regulator\"><select className=\"select\"><option>FSRA — Ontario</option><option>AMF — Québec</option><option>BCFSA — British Columbia</option><option>RECA — Alberta</option></select></Field>\n          <Field label=\"Province\"><select className=\"select\"><option>Ontario</option><option>Québec</option><option>British Columbia</option><option>Alberta</option><option>Manitoba</option><option>Saskatchewan</option><option>Nova Scotia</option></select></Field>\n          <Field label=\"License number\" hint=\"Format varies by regulator.\"><input className=\"input input-num\" placeholder=\"M08009124\" /></Field>\n        </div>\n      )}\n      {step === 2 && (\n        <div className=\"fade-in\">\n          <h2 className=\"h3\" style={{ marginBottom: 22 }}>Your profile</h2>\n          <div style={{ display: \"flex\", gap: 16, alignItems: \"center\", marginBottom: 20 }}>\n            <Avatar initials=\"+\" size={56} />\n            <button className=\"btn btn-ghost btn-sm\">Upload photo</button>\n          </div>\n          <Field label=\"Full name\"><input className=\"input\" placeholder=\"Marcus Chen\" /></Field>\n          <div style={{ display: \"grid\", gridTemplateColumns: \"1fr 1fr\", gap: 14 }}>\n            <Field label=\"Years in business\"><select className=\"select\"><option>Less than 2</option><option>2–5</option><option>6–10</option><option>More than 10</option></select></Field>\n            <Field label=\"Annual deal volume\"><select className=\"select\"><option>Under $10M</option><option>$10M–$25M</option><option>$25M–$50M</option><option>$50M+</option></select></Field>\n          </div>\n        </div>\n      )}\n\n      <div style={{ display: \"flex\", gap: 12, marginTop: 28 }}>\n        {step > 0 && <button className=\"btn btn-ghost\" onClick={() => setStep(s => s - 1)}>Back</button>}\n        <button className=\"btn btn-primary\" style={{ flex: 1 }} onClick={() => step < 2 ? setStep(s => s + 1) : onAuth()}>\n          {step < 2 ? \"Continue\" : \"Submit for review\"}\n        </button>\n      </div>\n      {step === 0 && <p className=\"small muted-text\" style={{ textAlign: \"center\", marginTop: 20 }}>Already have access? <a style={{ color: \"var(--slate)\", fontWeight: 600 }} onClick={() => nav(\"login\")}>Sign in</a></p>}\n    </AuthShell>\n  );\n}\n\n/* ---------- SUBMIT DEAL ---------- */\nfunction SubmitStepHead({ n, label, meta }) {\n  return <SectionDivider n={n} label={label} meta={meta} />;\n}\n\nfunction BrokerSubmit({ nav, toast }) {\n  const [step, setStep] = useState(0);\n  const [extracted, setExtracted] = useState(false);\n  const [anon, setAnon] = useState(true);\n  const steps = [\"Property\", \"Loan details\", \"Borrower\", \"Documents\", \"Review\"];\n\n  return (\n    <div className=\"page\" style={{ maxWidth: 860 }}>\n      <button className=\"btn btn-tertiary btn-sm\" style={{ marginBottom: 16, paddingLeft: 0 }} onClick={() => nav(\"pipeline\")}>‹ Cancel</button>\n      <h1 className=\"h1\" style={{ marginBottom: 8 }}>Submit a deal</h1>\n      <p className=\"lead\" style={{ fontSize: 16, marginBottom: 32 }}>It takes about four minutes. Your borrower stays anonymized until a lender signals interest.</p>\n\n      {/* Step rail */}\n      <div style={{ display: \"flex\", gap: 8, marginBottom: 36 }}>\n        {steps.map((s, i) => (\n          <div key={i} onClick={() => i < step && setStep(i)} style={{ flex: 1, cursor: i < step ? \"pointer\" : \"default\" }}>\n            <div style={{ height: 3, borderRadius: 2, background: i <= step ? \"var(--slate)\" : \"var(--border)\", marginBottom: 8, transition: \"background 200ms\" }} />\n            <span className=\"micro\" style={{ color: i <= step ? \"var(--slate-deep)\" : \"var(--muted)\", fontWeight: i === step ? 600 : 500 }}>{(\"0\" + (i + 1)).slice(-2)} {s}</span>\n          </div>\n        ))}\n      </div>\n\n      <div className=\"card card-pad\" style={{ padding: 36, minHeight: 360 }}>\n        {step === 0 && (\n          <div className=\"fade-in\">\n            <SubmitStepHead n=\"01\" label=\"Property\" meta=\"Address & location\" />\n            <Field label=\"Property address\"><input className=\"input\" placeholder=\"Start typing an address…\" defaultValue=\"142 Westbrook Avenue, East York, Toronto, ON\" /></Field>\n            <FigurePlaceholder label=\"[ map preview — 142 Westbrook Avenue ]\" style={{ height: 200, marginBottom: 16 }} />\n            <div style={{ display: \"grid\", gridTemplateColumns: \"1fr 1fr\", gap: 14 }}>\n              <Field label=\"Property type\"><select className=\"select\"><option>Detached</option><option>Semi-detached</option><option>Townhouse</option><option>Condominium</option><option>Multi-residential</option><option>Commercial</option><option>Vacant land</option></select></Field>\n              <Field label=\"Occupancy\"><select className=\"select\"><option>Owner-occupied</option><option>Tenant-occupied</option><option>Vacant</option></select></Field>\n            </div>\n          </div>\n        )}\n        {step === 1 && (\n          <div className=\"fade-in\">\n            <SubmitStepHead n=\"02\" label=\"Loan details\" />\n            <div style={{ display: \"grid\", gridTemplateColumns: \"1fr 1fr\", gap: 14 }}>\n              <Field label=\"Loan amount (CAD)\"><input className=\"input input-num\" defaultValue=\"425,000\" /></Field>\n              <Field label=\"Appraised value (CAD)\"><input className=\"input input-num\" defaultValue=\"590,000\" /></Field>\n              <Field label=\"Position\"><select className=\"select\"><option>First mortgage</option><option>Second mortgage</option><option>Third mortgage</option></select></Field>\n              <Field label=\"Computed LTV\" hint=\"Auto-calculated\"><input className=\"input input-num\" defaultValue=\"72.0%\" readOnly style={{ background: \"#FCFAF5\" }} /></Field>\n              <Field label=\"Term\"><select className=\"select\"><option>6 months</option><option>12 months</option><option>18 months</option><option>24 months</option></select></Field>\n              <Field label=\"Rate expectation\"><input className=\"input\" defaultValue=\"8.5–11%\" /></Field>\n            </div>\n          </div>\n        )}\n        {step === 2 && (\n          <div className=\"fade-in\">\n            <SubmitStepHead n=\"03\" label=\"Borrower snapshot\" meta=\"Anonymized by default\" />\n            <div style={{ display: \"flex\", alignItems: \"center\", justifyContent: \"space-between\", padding: \"16px 18px\", background: \"#FCFAF5\", border: \"1px solid var(--border)\", borderRadius: 6, marginBottom: 22 }}>\n              <div>\n                <div className=\"small\" style={{ fontWeight: 600, color: \"var(--slate-deep)\" }}>Reveal borrower identity on lender interest</div>\n                <div className=\"micro muted-text\">When off, lenders see the profile but not the name until they make an offer.</div>\n              </div>\n              <button onClick={() => setAnon(a => !a)} style={{ width: 44, height: 26, borderRadius: 13, border: \"none\", background: anon ? \"var(--border)\" : \"var(--sage)\", position: \"relative\", cursor: \"pointer\", flexShrink: 0, transition: \"background 200ms\" }}>\n                <span style={{ position: \"absolute\", top: 3, left: anon ? 3 : 21, width: 20, height: 20, borderRadius: \"50%\", background: \"#fff\", boxShadow: \"var(--shadow-sm)\", transition: \"left 200ms\" }} />\n              </button>\n            </div>\n            <div style={{ display: \"grid\", gridTemplateColumns: \"1fr 1fr\", gap: 14 }}>\n              <Field label=\"Employment\"><select className=\"select\"><option>Self-employed</option><option>Salaried</option><option>Commission</option><option>Retired</option></select></Field>\n              <Field label=\"Beacon score band\"><select className=\"select\"><option>680–720</option><option>640–680</option><option>720+</option><option>600–640</option></select></Field>\n              <Field label=\"Income (stated, CAD)\"><input className=\"input input-num\" defaultValue=\"180,000\" /></Field>\n              <Field label=\"Purpose\"><select className=\"select\"><option>Refinance — consolidation</option><option>Purchase</option><option>Bridge</option><option>Equity take-out</option></select></Field> TV\", \"72%\"], [\"Position\", \"First\"], [\"Term\", \"12 months\"], [\"Appraised value\", \"$590,000\"], [\"Property\", \"Detached\"], [\"Occupancy\", \"Owner-occupied\"]].map(([l, v], i) => (\n                      <div key={i}><div className=\"micro muted-text\">{l}</div><div className=\"num\" style={{ fontFamily: \"var(--serif)\", fontSize: 18, fontWeight: 600, color: \"var(--slate-deep)\" }}>{v}</div></div>\n                    ))}\n                  </div>\n                  <div style={{ display: \"flex\", gap: 10 }}>\n                    <button className=\"btn btn-primary btn-sm\">Confirm</button>\n                    <button className=\"btn btn-ghost btn-sm\">Edit values</button>\n                  </div>\n                </div>\n              </div>\n            )}\n          </div>\n        )}\n        {step === 4 && (\n          <div className=\"fade-in\">\n            <SubmitStepHead n=\"05\" label=\"Review & submit\" />\n            <DefList items={[\n              [\"Property\", \"142 Westbrook Avenue, East York, Toronto, ON\"],\n              [\"Property type\", \"Detached, owner-occupied\"],\n              [\"Loan amount\", \"$425,000 CAD\"],\n              [\"Position\", \"First mortgage\"],\n              [\"LTV\", \"72.0%\"],\n              [\"Term\", \"12 months\"],\n              [\"Rate expectation\", \"8.5–11%\"],\n              [\"Borrower\", anon ? \"Anonymized until lender interest\" : \"Revealed on submission\"],\n              [\"Documents\", \"3 attached\"],\n            ]} />\n            <div style={{ display: \"flex\", alignItems: \"flex-start\", gap: 10, marginTop: 22, padding: \"12px 14px\", background: \"#FCFAF5\", border: \"1px solid var(--border)\", borderRadius: 6 }}>\n              <input type=\"checkbox\" defaultChecked style={{ marginTop: 3 }} />\n              <span className=\"small muted-text\">I confirm I am the licensed broker of record for this deal and have the borrower&rsquo;s consent to submit it to the marketplace.</span>\n            </div>\n          </div>\n        )}\n      </div>\n\n      <div style={{ display: \"flex\", gap: 12, marginTop: 24, justifyContent: \"space-between\" }}>\n        <div>{step > 0 && <button className=\"btn btn-ghost\" onClick={() => setStep(s => s - 1)}>Back</button>}</div>\n        <div style={{ display: \"flex\", gap: 12 }}>\n          <button className=\"btn btn-tertiary\">Save draft</button>\n          <button className=\"btn btn-primary\" onClick={() => {\n            if (step < 4) setStep(s => s + 1);\n            else { toast({ title: \"Deal № 0252 submitted\", sub: \"Matching against 240 lender criteria sets.\" }); nav(\"dashboard\"); }\n          }}>{step < 4 ? \"Continue\" : \"Submit to marketplace\"}</button>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n/* ---------- SETTINGS ---------- */\nfunction BrokerSettings({ nav, toast }) {\n  const [tab, setTab] = useState(\"profile\");\n  const tabs = [[\"profile\", \"Profile\"], [\"brokerage\", \"Brokerage\"], [\"notifications\", \"Notifications\"], [\"billing\", \"Billing\"]];\n  return (\n    <div className=\"page\" style={{ maxWidth: 920 }}>\n      <h1 className=\"h1\" style={{ marginBottom: 8 }}>Account</h1>\n      <p className=\"lead\" style={{ fontSize: 16, marginBottom: 32 }}>Manage your profile, brokerage, and preferences.</p>\n      <div style={{ display: \"grid\", gridTemplateColumns: \"200px 1fr\", gap: 40 }}>\n        <div style={{ display: \"flex\", flexDirection: \"column\", gap: 2 }}>\n          {tabs.map(([id, lbl]) => (\n            <a key={id} className={\"nav-item\" + (tab === id ? \" active\" : \"\")} onClick={() => setTab(id)}>{lbl}</a>\n          ))}\n        </div>\n        <div>\n          {tab === \"profile\" && (\n            <div className=\"fade-in\">\n              <SectionDivider n=\"01\" label=\"Profile\" />\n              <div style={{ display: \"flex\", gap: 18, alignItems: \"center\", marginBottom: 24 }}>\n                <Avatar initials=\"MC\" size={64} />\n                <button className=\"btn btn-ghost btn-sm\">Change photo</button>\n              </div>\n              <div style={{ display: \"grid\", gridTemplateColumns: \"1fr 1fr\", gap: 16 }}>\n                <Field label=\"Full name\"><input className=\"input\" defaultValue=\"Marcus Chen\" /></Field>\n                <Field label=\"Email\"><input className=\"input\" defaultValue=\"marcus@northbridge.ca\" /></Field>\n                <Field label=\"Phone\"><input className=\"input input-num\" defaultValue=\"(416) 555-0142\" /></Field>\n                <Field label=\"Years in business\"><select className=\"select\"><option>6–10</option><option>More than 10</option></select></Field>\n              </div>\n              <button className=\"btn btn-primary\" style={{ marginTop: 12 }} onClick={() => toast({ title: \"Profile updated\" })}>Save changes</button>\n            </div>\n          )}\n          {tab === \"brokerage\" && (\n            <div className=\"fade-in\">\n              <SectionDivider n=\"02\" label=\"Brokerage\" />\n              <DefList items={[\n                [\"Brokerage\", \"Northbridge Mortgage Partners\"],\n                [\"Regulator\", \"FSRA — Ontario\"],\n                [\"License\", \"M08009124\"],\n                [\"Province\", \"Ontario\"],\n                [\"Verification status\", \"Verified\"],\n              ]} />\n              <button className=\"btn btn-ghost\" style={{ marginTop: 18 }}>Update brokerage details</button>\n            </div>\n          )}\n          {tab === \"notifications\" && (\n            <div className=\"fade-in\">\n              <SectionDivider n=\"03\" label=\"Notifications\" />\n              {[[\"New offers\", true], [\"Offer expiring soon\", true], [\"Lender views your deal\", false], [\"Deal funded\", true], [\"Weekly pipeline digest\", true]].map(([l, on], i) => (\n                <SettingToggle key={i} label={l} on={on} />\n              ))}\n            </div>\n          )}\n          {tab === \"billing\" && (\n            <div className=\"fade-in\">\n              <SectionDivider n=\"04\" label=\"Billing\" meta=\"Brokers transact at funding\" />\n              <div className=\"card card-pad\" style={{ background: \"#FCFAF5\", marginBottom: 20 }}>\n                <p className=\"small muted-text\">Plynth is free for brokers. A success fee of 0.25% applies only when a deal funds through the marketplace, invoiced at closing.</p>\n              </div>\n              <DefList items={[\n                [\"Plan\", \"Broker — no subscription\"],\n                [\"Success fee\", \"0.25% at funding\"],\n                [\"Funded this year\", \"$38.6M CAD\"],\n                [\"Fees invoiced YTD\", \"$96,500 CAD\"],\n              ]} />\n            </div>\n          )}\n        </div>\n      </div>\n    </div>\n  );\n}\n\nfunction SettingToggle({ label, on: initial }) {\n  const [on, setOn] = useState(initial);\n  return (\n    <div style={{ display: \"flex\", alignItems: \"center\", justifyContent: \"space-between\", padding: \"14px 0\", borderBottom: \"1px solid var(--border)\" }}>\n      <span className=\"small\" style={{ color: \"var(--slate-deep)\", fontWeight: 500 }}>{label}</span>\n      <button onClick={() => setOn(o => !o)} style={{ width: 44, height: 26, borderRadius: 13, border: \"none\", background: on ? \"var(--sage)\" : \"var(--border)\", position: \"relative\", cursor: \"pointer\", transition: \"background 200ms\" }}>\n        <span style={{ position: \"absolute\", top: 3, left: on ? 21 : 3, width: 20, height: 20, borderRadius: \"50%\", background: \"#fff\", boxShadow: \"var(--shadow-sm)\", transition: \"left 200ms\" }} />\n      </button>\n    </div>\n  );\n}\n\nObject.assign(window, { BrokerLogin, BrokerSignup, BrokerSubmit, BrokerSettings });\n\n<\/script>\n\n<script type=\"text/babel\">\nconst { useState, useEffect } = React;\n\n/* Aggregated offers screen */\nfunction BrokerOffers({ nav, toast }) {\n  return (\n    <div className=\"page page-wide\">\n      <div style={{ marginBottom: 28 }}>\n        <h1 className=\"h1\">Offers</h1>\n        <p className=\"lead\" style={{ fontSize: 16, marginTop: 6 }}>Live offers across your pipeline. Three new, four awaiting your response.</p>\n      </div>\n      <SectionDivider n=\"01\" label=\"New offers\" meta=\"Action needed\" />\n      <div style={{ display: \"grid\", gridTemplateColumns: \"1fr 1fr 1fr\", gap: 16, marginBottom: 44 }} className=\"dash-cols\">\n        {window.BROKER.newOffers.map((o, i) => (\n          <div key={i} className=\"card card-pad card-hover\" style={{ padding: 22, cursor: \"pointer\" }} onClick={() => nav(\"deal\", o.no)}>\n            <div style={{ display: \"flex\", justifyContent: \"space-between\", marginBottom: 12 }}><DealNo n={o.no} /><Pill status=\"offer\" /></div>\n            <div style={{ display: \"flex\", alignItems: \"baseline\", gap: 8, marginBottom: 12 }}>\n              <span className=\"tnum\" style={{ fontFamily: \"var(--serif)\", fontSize: 30, color: \"var(--slate-deep)\", fontWeight: 600 }}>{o.rate}</span>\n              <span className=\"small muted-text\">· {o.fee} fee · {o.term}</span>\n            </div>\n            <div className=\"micro muted-text\">{o.lender} · {o.city}</div>\n            <div style={{ display: \"flex\", gap: 8, marginTop: 16 }}>\n              <button className=\"btn btn-primary btn-sm\" style={{ flex: 1 }} onClick={(e) => { e.stopPropagation(); toast({ title: \"Offer on Deal № \" + o.no + \" accepted\" }); }}>Accept</button>\n              <button className=\"btn btn-ghost btn-sm\" onClick={(e) => { e.stopPropagation(); nav(\"deal\", o.no); }}>Review</button>\n            </div>\n          </div>\n        ))}\n      </div>\n      <SectionDivider n=\"02\" label=\"Awaiting response\" meta=\"Sent counters\" />\n      <div className=\"card\" style={{ overflow: \"hidden\" }}>\n        {window.BROKER.awaiting.map((d, i) => (\n          <div key={i} onClick={() => nav(\"deal\", d.no)} style={{ display: \"flex\", alignItems: \"center\", gap: 20, padding: \"18px 22px\", borderBottom: i < 1 ? \"1px solid var(--border)\" : \"none\", cursor: \"pointer\" }}>\n            <DealNo n={d.no} />\n            <span className=\"small\" style={{ flex: 1 }}>{d.city}</span>\n            <span className=\"num small\" style={{ fontWeight: 600, color: \"var(--slate-deep)\" }}>{d.amount}</span>\n            <Pill status=\"negotiating\" />\n          </div>\n        ))}\n      </div>\n    </div>\n  );\n}\n\nconst NAV = [\n  { id: \"dashboard\", label: \"Dashboard\" },\n  { id: \"pipeline\", label: \"Pipeline\" },\n  { id: \"submit\", label: \"Submit Deal\" },\n  { id: \"offers\", label: \"Offers\" },\n  { id: \"funded\", label: \"Funded\" },\n  { id: \"lenders\", label: \"Lenders\" },\n  { group: \"Account\" },\n  { id: \"settings\", label: \"Account\" },\n];\n\nfunction App() {\n  const initialHash = (location.hash || \"\").replace(\"#\", \"\");\n  const startAuthed = initialHash !== \"login\" && initialHash !== \"signup\";\n  const [authed, setAuthed] = useState(startAuthed);\n  const [route, setRoute] = useState(startAuthed ? \"dashboard\" : (initialHash || \"login\"));\n  const [param, setParam] = useState(null);\n  const [toast, fireToast] = useToast();\n\n  const nav = (r, p) => { setRoute(r); setParam(p || null); window.scrollTo(0, 0); };\n  const auth = () => { setAuthed(true); nav(\"dashboard\"); };\n\n  if (!authed) {\n    if (route === \"signup\") return (<React.Fragment><BrokerSignup nav={nav} onAuth={auth} /><Toast {...(toast || {})} /></React.Fragment>);\n    return (<React.Fragment><BrokerLogin nav={nav} onAuth={auth} /><Toast {...(toast || {})} /></React.Fragment>);\n  }\n\n  const screens = {\n    dashboard: <BrokerDashboard nav={nav} />,\n    pipeline: <BrokerPipeline nav={nav} />,\n    submit: <BrokerSubmit nav={nav} toast={fireToast} />,\n    offers: <BrokerOffers nav={nav} toast={fireToast} />,\n    deal: <BrokerDealDetail nav={nav} toast={fireToast} dealNo={param} />,\n    lenders: <BrokerLenders nav={nav} />,\n    funded: <BrokerFunded nav={nav} />,\n    settings: <BrokerSettings nav={nav} toast={fireToast} />,\n  };\n  const activeNav = route === \"deal\" ? \"pipeline\" : route;\n\n  return (\n    <div>\n      <div className=\"topbar\">\n        <Logo size={30} onClick={() => nav(\"dashboard\")} />\n        <div className=\"spacer\" />\n        <button className=\"btn btn-primary btn-sm\" onClick={() => nav(\"submit\")}>Submit a deal</button>\n        <div style={{ width: 1, height: 24, background: \"var(--border)\", margin: \"0 6px\" }} />\n        <ProfileMenu name={window.BROKER.user.name} sub={window.BROKER.user.brokerage} initials={window.BROKER.user.initials}\n          items={[\n            { label: \"Account settings\", onClick: () => nav(\"settings\") },\n            { label: \"Brokerage\", onClick: () => nav(\"settings\") },\n            { label: \"Sign out\", danger: true, onClick: () => { setAuthed(false); nav(\"login\"); } },\n          ]} />\n      </div>\n      <div className=\"app\">\n        <Sidebar items={NAV} active={activeNav} onNavigate={nav}\n          footer={<div className=\"micro muted-text\" style={{ padding: \"0 12px\" }}>Northbridge Mortgage Partners<br />FSRA M08009124</div>} />\n        <div className=\"app-main\">{screens[route]}</div>\n      </div>\n      <Toast {...(toast || {})} />\n    </div>\n  );\n}\n\nReactDOM.createRoot(document.getElementById(\"root\")).render(<App />);\n<\/script>\n<script>\n(function(){\n  var f2s = {\"index.html\":\"\",\"Design System.html\":\"design-system\",\"Broker.html\":\"broker\",\"Broker Portal.html\":\"broker-portal\",\"Lender.html\":\"lender\",\"Lender Portal.html\":\"lender-portal\",\"Criteria Builder.html\":\"criteria\"};\n  document.addEventListener(\"click\", function(e){\n    var a = e.target.closest && e.target.closest(\"a[href]\");\n    if(!a) return;\n    var href = a.getAttribute(\"href\");\n    if(!href || href.indexOf(\"ja
