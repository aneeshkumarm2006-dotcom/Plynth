<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plynth — Criteria Builder</title>
<link rel="stylesheet" href="assets/plynth.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  @media (max-width: 980px){ .cb-grid{ grid-template-columns:1fr !important; } .cb-preview{ position:static !important; } .cb-assets{ grid-template-columns:1fr !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="assets/lender-data.js"></script>
<script type="text/babel" src="assets/shared.jsx"></script>
<script type="text/babel" src="assets/criteria-builder.jsx"></script>
<script type="text/babel">
function Page() {
  const [toast, fire] = useToast();
  return (
    <div>
      <div className="topbar">
        <Logo size={30} />
        <span className="micro" style={{ color: "var(--muted)", borderLeft: "1px solid var(--border)", paddingLeft: 12, marginLeft: 4, letterSpacing: "0.1em", textTransform: "uppercase" }}>For Lenders</span>
        <div className="spacer" />
        <span className="pill pill-matched">Professional</span>
        <ProfileMenu name={window.LENDER.user.name} sub={window.LENDER.user.firm} initials={window.LENDER.user.initials} items={[{ label: "Sign out", danger: true }]} />
      </div>
      <div className="page page-wide" style={{ paddingTop: 40 }}>
        <div style={{ marginBottom: 36, maxWidth: 620 }}>
          <div className="eyebrow" style={{ marginBottom: 14 }}>Criteria</div>
          <h1 className="h1">Configure what you fund.</h1>
          <p className="lead" style={{ fontSize: 17, marginTop: 8 }}>Tune each parameter and watch the marketplace respond. Only deals that fit will reach you.</p>
        </div>
        <CriteriaBuilder
          onComplete={() => fire({ title: "Criteria saved", sub: "Matching begins immediately for new deals." })}
          ctaLabel="Save criteria"
          note="Changes affect matching for new deals only." />
      </div>
      <Toast {...(toast || {})} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>
